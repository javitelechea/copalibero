# Despliega la app estática (demo) a GitHub Pages.
# Requisito en el repo: Settings → Pages → Build and deployment → Source: GitHub Actions
# (si tenías "Deploy from a branch" + raíz sin index.html, GitHub mostraba el README: eso lo evita este workflow.)
name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install and build static site
        env:
          COPALIBERO_STATIC: "1"
          NEXT_PUBLIC_COPALIBERO_STATIC_EXPORT: "1"
          COPALIBERO_GITHUB_PAGES: "1"
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm ci && npm run build:static

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
